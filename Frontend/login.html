<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: url('background_image.jpg') center/cover no-repeat;
      background-attachment: fixed; /* background stays steady */
      margin: 0;
      height: 100vh; /* lock to viewport height */
      display: flex;
      justify-content: ceanter;
      align-items: center; /* card centered vertically */
      position: relative;
      overflow: hidden; /* prevent scrolling */
    }

  body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.2); /* lighter overlay */
  pointer-events: none;
}
  

 .card {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(110, 110, 110, 0.2);
  padding: 25px;
  border-radius: 20px;
  width: 230px;
  height: 360px;
  color: #fff;
  text-align: center;

  display: flex;
  flex-direction: column;
  justify-content: center; /* centers fields vertically */
}

    .field {
      margin-bottom: 12px;
      text-align: left;
    }

    .field label {
      font-size: 13px;
      font-weight: bold;
      display: block;
      margin-bottom: 4px;
    }

    .field input {
      width: 100%;
      padding: 6px;
      border: none;
      border-bottom: 2px solid #ccc;
      background: transparent;
      color: #fff;
    }

    .field input::placeholder {
      color: #aaa;
    }

    .forgot {
      text-align: right;
      margin-bottom: 12px;
    }

    .forgot a {
      font-size: 13px;
      font-weight: bold;
      color: #000000;
      text-decoration: none;
    }

    .btn {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 8px;
      background: #fff;
      color: #000;
      font-weight: bold;
      cursor: pointer;

      margin-bottom: 20px;
    }

    .btn-google {
      width: 100%;
      padding: 8px;
      border: 0px solid rgba(0,0,0,0.2);
      border-radius: 8px;
       background: rgba(197, 197, 197, 0.3);
      color: #ffffff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-google svg {
      width: 16px;
      height: 16px;
    }
    .signup {
      margin-top: 12px;
      text-align: right;
      font-size: 9px;
      color: #ccc;
    }

    .signup a {
      color: #fff;
    
    }

  </style>
</head>
<body>
  <div class="card">
    <div class="field">
      <label for="username">Username</label>
      <input id="username" type="text" placeholder="Enter your username">
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="••••••••">
    </div>

    <div class="forgot">
      <a href="#">Forgot password?</a>
    </div>

    <button class="btn">Login</button>

    <button class="btn-google">
      <!-- Google "G" Logo -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.5 0 6.7 1.2 9.2 3.6l6.8-6.8C35.9 2.4 30.5 0 24 0 14.6 0 6.5 5.4 2.6 13.2l8 6.2C12.4 13.7 17.7 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M47 24.6c0-1.6-.2-3.1-.4-4.6H24v9h12.9c-.6 3-2.3 5.5-4.8 7.2l7.7 6c4.5-4.2 7.2-10.4 7.2-17.6z"/>
        <path fill="#FBBC05" d="M10.5 28.6c-.5-1.5-.8-3-.8-4.6s.3-3.1.8-4.6l-8-6.2C.9 16.5 0 20.1 0 24c0 3.9.9 7.5 2.6 10.8l8-6.2z"/>
        <path fill="#34A853" d="M24 48c6.5 0 11.9-2.1 15.9-5.8l-7.7-6c-2.2 1.5-5 2.4-8.2 2.4-6.3 0-11.6-4.2-13.5-9.9l-8 6.2C6.5 42.6 14.6 48 24 48z"/>
      </svg>
      Continue with Google
    </button>
        <div class="signup">
      Don’t have an account? <a href="#">Signup</a>
    </div>

  </div>
</body>
</html>
