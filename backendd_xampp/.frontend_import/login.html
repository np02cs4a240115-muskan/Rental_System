<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VroomNepal - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f0f0f8;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .card {
      background: #ffffff;
      padding: 36px 30px 30px;
      border-radius: 20px;
      width: 340px;
      box-shadow: 0 8px 32px rgba(80, 80, 180, 0.10), 0 1.5px 6px rgba(0,0,0,0.07);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Logo */
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-bottom: 26px;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
      color: #5b5fc7;
    }

    /* Fields */
    .field {
      width: 100%;
      margin-bottom: 14px;
      text-align: left;
    }

    .field label {
      font-size: 12.5px;
      font-weight: 600;
      color: #333348;
      display: block;
      margin-bottom: 6px;
    }

    /* Shadow border on input container */
    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
      border-radius: 10px;
      box-shadow: 0 0 0 1.5px #e2e2ec, 0 2px 8px rgba(91, 95, 199, 0.10);
      background: #fafafa;
      transition: box-shadow 0.2s;
    }

    .input-wrap:focus-within {
      box-shadow: 0 0 0 2px #5b5fc7, 0 2px 12px rgba(91, 95, 199, 0.18);
      background: #fff;
    }

    .input-icon {
      position: absolute;
      left: 12px;
      width: 15px;
      height: 15px;
      stroke: #aaaabc;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .field input {
      width: 100%;
      padding: 11px 36px 11px 36px;
      border: none;
      border-radius: 10px;
      background: transparent;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      color: #1a1a2e;
      outline: none;
    }

    .field input::placeholder {
      color: #c8c8d8;
    }

    .eye-btn {
      position: absolute;
      right: 11px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
    }

    .eye-btn svg {
      width: 15px;
      height: 15px;
      stroke: #aaaabc;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Forgot */
    .forgot {
      width: 100%;
      text-align: right;
      margin-bottom: 18px;
      margin-top: -4px;
    }

    .forgot a {
      font-size: 11.5px;
      font-weight: 500;
      color: #5b5fc7;
      text-decoration: none;
    }

    .forgot a:hover { text-decoration: underline; }

    /* Login btn */
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #5b5fc7;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      margin-bottom: 12px;
      transition: background 0.2s;
      box-shadow: 0 4px 14px rgba(91, 95, 199, 0.30);
    }

    .btn:hover { background: #4a4eb6; }

    /* Google btn */
    .btn-google {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 10px;
      background: #f8f8fc;
      color: #444460;
      font-size: 13px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s;
      box-shadow: 0 0 0 1.5px #e2e2ec, 0 2px 8px rgba(0,0,0,0.05);
      margin-bottom: 16px;
    }

    .btn-google:hover { background: #ededf8; }

    .btn-google svg {
      width: 17px;
      height: 17px;
      flex-shrink: 0;
    }

    /* Signup */
    .signup {
      font-size: 12px;
      color: #888899;
      text-align: center;
    }

    .signup a {
      color: #5b5fc7;
      font-weight: 600;
      text-decoration: none;
      margin-left: 3px;
    }

    .signup a:hover { text-decoration: underline; }

    .input-wrap.error {
      box-shadow: 0 0 0 2px #e74c3c, 0 2px 8px rgba(231,76,60,0.12);
    }

    .field-error {
      font-size: 11px;
      color: #e74c3c;
      margin-top: 4px;
      min-height: 15px;
      display: block;
    }
  </style>
</head>
<body>

  <div class="card">

    <!-- Logo -->
    <div class="logo-wrap">
      <svg width="54" height="54" viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
        <circle cx="28" cy="28" r="28" fill="#eeeeff"/>
        <polyline points="10,18 19,38 28,22" fill="none" stroke="#5b5fc7" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="28,22 37,38 46,18" fill="none" stroke="#5b5fc7" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="14" y1="41" x2="42" y2="41" stroke="#5b5fc7" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <span class="logo-text">VroomNepal</span>
    </div>

    <!-- Email -->
    <div class="field">
      <label for="username">Email</label>
      <div class="input-wrap" id="emailWrap">
        <svg class="input-icon" viewBox="0 0 24 24">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <polyline points="2,4 12,13 22,4"/>
        </svg>
        <input id="username" type="email" placeholder="johndoe@gmail.com" oninput="clearErr('emailWrap','emailErr')"/>
      </div>
      <span class="field-error" id="emailErr"></span>
    </div>

    <!-- Password -->
    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrap" id="pwdWrap">
        <svg class="input-icon" viewBox="0 0 24 24">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input id="password" type="password" placeholder="••••••••••" oninput="clearErr('pwdWrap','pwdErr')"/>
        <button class="eye-btn" onclick="togglePassword()" type="button">
          <svg id="eyeIcon" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <span class="field-error" id="pwdErr"></span>
    </div>

    <!-- Forgot -->
    <div class="forgot">
      <a href="forgotPassword.html">Forgot password?</a>
    </div>

    <!-- Login -->
    <button class="btn" onclick="handleLogin()">Login</button>

    <!-- Google -->
    <button class="btn-google">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.5 0 6.7 1.2 9.2 3.6l6.8-6.8C35.9 2.4 30.5 0 24 0 14.6 0 6.5 5.4 2.6 13.2l8 6.2C12.4 13.7 17.7 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M47 24.6c0-1.6-.2-3.1-.4-4.6H24v9h12.9c-.6 3-2.3 5.5-4.8 7.2l7.7 6c4.5-4.2 7.2-10.4 7.2-17.6z"/>
        <path fill="#FBBC05" d="M10.5 28.6c-.5-1.5-.8-3-.8-4.6s.3-3.1.8-4.6l-8-6.2C.9 16.5 0 20.1 0 24c0 3.9.9 7.5 2.6 10.8l8-6.2z"/>
        <path fill="#34A853" d="M24 48c6.5 0 11.9-2.1 15.9-5.8l-7.7-6c-2.2 1.5-5 2.4-8.2 2.4-6.3 0-11.6-4.2-13.5-9.9l-8 6.2C6.5 42.6 14.6 48 24 48z"/>
      </svg>
      Continue with Google
    </button>

    <!-- Signup -->
    <div class="signup">
      Don't have an account?<a href="signup.html">Sign Up</a>
    </div>

  </div>

  <script>
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    function showErr(wrapId, errId, msg) {
      document.getElementById(wrapId).classList.add('error');
      document.getElementById(errId).textContent = msg;
    }

    function clearErr(wrapId, errId) {
      document.getElementById(wrapId).classList.remove('error');
      document.getElementById(errId).textContent = '';
    }

    function handleLogin() {
      const email = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      let valid = true;

      if (!email) {
        showErr('emailWrap', 'emailErr', 'Please enter your email address.');
        valid = false;
      } else if (!emailRegex.test(email)) {
        showErr('emailWrap', 'emailErr', 'Please enter a valid email address.');
        valid = false;
      }

      if (!password) {
        showErr('pwdWrap', 'pwdErr', 'Please enter your password.');
        valid = false;
      } else if (password.length < 6) {
        showErr('pwdWrap', 'pwdErr', 'Password must be at least 6 characters.');
        valid = false;
      }

      if (valid) {
        // Proceed with login
        alert('Logging in...');
      }
    }

    function togglePassword() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;
      } else {
        input.type = 'password';
        icon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
      }
    }
  </script>

</body>
</html>
