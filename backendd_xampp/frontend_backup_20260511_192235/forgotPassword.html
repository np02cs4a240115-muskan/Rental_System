<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VroomNepal - Forgot Password</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background-color: #e8e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .card {
    background: #ffffff;
    border-radius: 20px;
    padding: 32px 32px 36px;
    width: 380px;
    max-width: 100%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    position: relative;
  }

  .back-link {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: #5b5fc7;
    text-decoration: none;
    font-weight: 500;
    margin-bottom: 24px;
  }

  .back-link svg {
    width: 16px; height: 16px;
    stroke: #5b5fc7; fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  }

  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    margin-bottom: 20px;
  }

  .logo-icon { width: 56px; height: 56px; }

  .logo-text {
    font-size: 20px;
    font-weight: 700;
    color: #5b5fc7;
    letter-spacing: 0.2px;
  }

  .page-title {
    font-size: 22px;
    font-weight: 700;
    color: #1a1a2e;
    text-align: center;
    margin-bottom: 24px;
  }

  .field-label {
    font-size: 14px;
    font-weight: 500;
    color: #1a1a2e;
    margin-bottom: 8px;
    display: block;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 6px;
  }

  .input-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    stroke: #aaa; fill: none;
    stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
  }

  .text-input {
    width: 100%;
    padding: 12px 14px 12px 40px;
    border: 1.5px solid #e0e0e8;
    border-radius: 10px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    color: #1a1a2e;
    background: #fafafa;
    outline: none;
    transition: border-color 0.2s;
  }

  .text-input::placeholder { color: #c0c0cc; }
  .text-input:focus { border-color: #5b5fc7; background: #fff; }
  .text-input.error { border-color: #e74c3c; }

  .field-error {
    font-size: 12px;
    color: #e74c3c;
    min-height: 18px;
    margin-bottom: 10px;
    display: block;
  }

  .btn-primary {
    width: 100%;
    padding: 14px;
    background: #5b5fc7;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    color: #ffffff;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.2s, opacity 0.2s;
    margin-bottom: 28px;
  }

  .btn-primary:hover:not(:disabled) { background: #4a4eb6; }
  .btn-primary:disabled { opacity: 0.65; cursor: not-allowed; }

  .btn-primary svg {
    width: 16px; height: 16px;
    stroke: #fff; fill: none;
    stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
  }

  /* API banner */
  .api-msg {
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 16px;
    text-align: center;
    display: none;
  }
  .api-msg.error   { display: block; background: #fef0f0; color: #c0392b; border: 1px solid #f5c6cb; }
  .api-msg.success { display: block; background: #f0fef4; color: #1a7a3a; border: 1px solid #b7eac7; }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .divider-line { flex: 1; height: 1px; background: #e8e8ee; }
  .divider-text {
    font-size: 11px; color: #aaaabc;
    letter-spacing: 1px; font-weight: 500; white-space: nowrap;
  }

  /* OTP section */
  .otp-instruction {
    font-size: 14px; font-weight: 600;
    color: #1a1a2e; text-align: center;
    margin-bottom: 20px;
  }

  .otp-boxes {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 24px;
  }

  .otp-input {
    width: 46px; height: 46px;
    border-radius: 10px;
    border: 1.5px solid #e0e0e8;
    background: #f0f0f8;
    font-size: 20px; font-weight: 600;
    text-align: center;
    color: #1a1a2e;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    caret-color: #5b5fc7;
  }

  .otp-input:focus { border-color: #5b5fc7; background: #fff; }
  .otp-input.error { border-color: #e74c3c; }

  .otp-error {
    font-size: 12px; color: #e74c3c;
    text-align: center; min-height: 18px;
    margin-bottom: 12px; display: block;
  }

  .btn-verify {
    width: 100%;
    padding: 14px;
    background: #5b5fc7;
    border: none;
    border-radius: 10px;
    font-size: 15px; font-weight: 600;
    color: #ffffff;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: background 0.2s, opacity 0.2s;
    margin-bottom: 16px;
  }

  .btn-verify:hover:not(:disabled) { background: #4a4eb6; }
  .btn-verify:disabled { opacity: 0.65; cursor: not-allowed; }

  .resend-wrap { text-align: center; }
  .resend-timer { font-size: 13px; font-weight: 600; color: #1a1a2e; margin-bottom: 4px; }
  .resend-link {
    font-size: 13px; color: #5b5fc7;
    font-weight: 500; text-decoration: none; cursor: pointer;
  }
  .resend-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="card">

  <!-- Back to Login -->
  <a href="login.html" class="back-link">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Login
  </a>

  <!-- Logo -->
  <div class="logo-wrap">
    <svg class="logo-icon" viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
      <circle cx="28" cy="28" r="28" fill="#eeeeff"/>
      <polyline points="10,18 19,38 28,22" fill="none" stroke="#5b5fc7" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="28,22 37,38 46,18" fill="none" stroke="#5b5fc7" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="14" y1="41" x2="42" y2="41" stroke="#5b5fc7" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <span class="logo-text">VroomNepal</span>
  </div>

  <!-- Title -->
  <div class="page-title">Forgot Password?</div>

  <!-- API Banner -->
  <div class="api-msg" id="apiMsg"></div>

  <!-- Email -->
  <label class="field-label">Email</label>
  <div class="input-wrap">
    <svg class="input-icon" viewBox="0 0 24 24">
      <rect x="2" y="4" width="20" height="16" rx="2"/>
      <polyline points="2,4 12,13 22,4"/>
    </svg>
    <input class="text-input" type="email" placeholder="john@example.com" id="emailInput" oninput="clearEmailError()"/>
  </div>
  <span class="field-error" id="emailError"></span>

  <!-- Send OTP button -->
  <button class="btn-primary" id="sendOtpBtn" onclick="sendOTP()">
    Send OTP
    <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
  </button>

  <!-- Verification section (hidden until OTP sent) -->
  <div id="verificationSection" style="display:none;">

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">Verification</span>
      <div class="divider-line"></div>
    </div>

    <div class="otp-instruction">Enter the 6-digit code sent to your email</div>

    <div class="otp-boxes">
      <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
      <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
      <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
      <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
      <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
      <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
    </div>
    <span class="otp-error" id="otpError"></span>

    <button class="btn-verify" id="verifyBtn" onclick="verifyOTP()">Verify OTP</button>

    <div class="resend-wrap">
      <div class="resend-timer" id="resendTimer">Resend OTP in 60s</div>
      <a class="resend-link" id="resendLink" style="display:none;" onclick="resendOTP()">Resend OTP &gt;</a>
    </div>

  </div>

</div>

<script>
  const API_BASE = 'http://localhost:5001/api';
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  let countdown = null;

  // ─── Helpers ───────────────────────────────────────────────────────────────
  function showApiMsg(msg, type) {
    const el = document.getElementById('apiMsg');
    el.textContent = msg;
    el.className = 'api-msg ' + type;
  }

  function hideApiMsg() {
    const el = document.getElementById('apiMsg');
    el.className = 'api-msg';
  }

  function clearEmailError() {
    document.getElementById('emailInput').classList.remove('error');
    document.getElementById('emailError').textContent = '';
    hideApiMsg();
  }

  function setOtpError(msg) {
    document.getElementById('otpError').textContent = msg;
    document.querySelectorAll('.otp-input').forEach(i => i.classList.add('error'));
  }

  function clearOtpError() {
    document.getElementById('otpError').textContent = '';
    document.querySelectorAll('.otp-input').forEach(i => i.classList.remove('error'));
  }

  // ─── Timer ─────────────────────────────────────────────────────────────────
  function startTimer() {
    const timerEl  = document.getElementById('resendTimer');
    const resendEl = document.getElementById('resendLink');
    let seconds = 60;

    timerEl.style.display = 'block';
    resendEl.style.display = 'none';
    timerEl.textContent = `Resend OTP in ${seconds}s`;

    if (countdown) clearInterval(countdown);

    countdown = setInterval(() => {
      seconds--;
      if (seconds <= 0) {
        clearInterval(countdown);
        timerEl.style.display = 'none';
        resendEl.style.display = 'inline';
      } else {
        timerEl.textContent = `Resend OTP in ${seconds}s`;
      }
    }, 1000);
  }

  // ─── Send OTP ──────────────────────────────────────────────────────────────
  async function sendOTP() {
    hideApiMsg();
    const emailInput = document.getElementById('emailInput');
    const email = emailInput.value.trim();

    if (!email) {
      emailInput.classList.add('error');
      document.getElementById('emailError').textContent = 'Please enter your email address.';
      return;
    }
    if (!emailRegex.test(email)) {
      emailInput.classList.add('error');
      document.getElementById('emailError').textContent = 'Please enter a valid email address.';
      return;
    }

    const btn = document.getElementById('sendOtpBtn');
    btn.disabled = true;
    btn.innerHTML = 'Sending…';

    try {
      const res = await fetch(`${API_BASE}/auth/forgot-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });

      const data = await res.json();

      if (!res.ok || !data.success) {
        // Email not registered — show under the field
        if (res.status === 404) {
          emailInput.classList.add('error');
          document.getElementById('emailError').textContent = data.message;
        } else {
          showApiMsg(data.message || 'Something went wrong.', 'error');
        }
        return;
      }

      // Success — show OTP section
      showApiMsg('OTP sent! Check your email inbox.', 'success');
      emailInput.disabled = true;
      document.getElementById('verificationSection').style.display = 'block';
      document.querySelectorAll('.otp-input')[0].focus();
      startTimer();

    } catch (err) {
      showApiMsg('Cannot connect to server. Make sure backend is running.', 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Send OTP <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';
    }
  }

  // ─── Resend OTP ────────────────────────────────────────────────────────────
  async function resendOTP() {
    document.querySelectorAll('.otp-input').forEach(i => i.value = '');
    clearOtpError();
    hideApiMsg();

    const email = document.getElementById('emailInput').value.trim();

    try {
      const res = await fetch(`${API_BASE}/auth/forgot-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      const data = await res.json();
      if (data.success) {
        showApiMsg('New OTP sent! Check your email.', 'success');
        startTimer();
      } else {
        showApiMsg(data.message || 'Failed to resend OTP.', 'error');
      }
    } catch {
      showApiMsg('Cannot connect to server.', 'error');
    }
  }

  // ─── Verify OTP ────────────────────────────────────────────────────────────
  async function verifyOTP() {
    clearOtpError();
    hideApiMsg();

    const inputs = [...document.querySelectorAll('.otp-input')];
    const otp = inputs.map(i => i.value).join('');

    if (otp.length < 6) {
      setOtpError('Please enter all 6 digits.');
      return;
    }

    const email = document.getElementById('emailInput').value.trim();
    const btn   = document.getElementById('verifyBtn');
    btn.disabled = true;
    btn.textContent = 'Verifying…';

    try {
      const res = await fetch(`${API_BASE}/auth/verify-otp`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, otp }),
      });

      const data = await res.json();

      if (!res.ok || !data.success) {
        setOtpError(data.message || 'Invalid OTP. Please try again.');
        return;
      }

      // OTP verified — pass reset token to reset page
      showApiMsg('OTP verified! Redirecting…', 'success');
      setTimeout(() => {
        window.location.href = `resetPassword.html?token=${encodeURIComponent(data.resetToken)}`;
      }, 800);

    } catch {
      showApiMsg('Cannot connect to server.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Verify OTP';
    }
  }

  // ─── OTP auto-advance ──────────────────────────────────────────────────────
  document.addEventListener('input', (e) => {
    if (!e.target.classList.contains('otp-input')) return;
    const inputs = [...document.querySelectorAll('.otp-input')];
    const i = inputs.indexOf(e.target);
    e.target.value = e.target.value.replace(/[^0-9]/g, '');
    clearOtpError();
    if (e.target.value && i < inputs.length - 1) inputs[i + 1].focus();
  });

  document.addEventListener('keydown', (e) => {
    if (!e.target.classList.contains('otp-input')) return;
    const inputs = [...document.querySelectorAll('.otp-input')];
    const i = inputs.indexOf(e.target);
    if (e.key === 'Backspace' && !e.target.value && i > 0) inputs[i - 1].focus();
  });
</script>

</body>
</html>
