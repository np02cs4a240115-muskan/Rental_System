<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VroomNepal - Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background-color: #e8e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .card {
    background: #ffffff;
    border-radius: 20px;
    padding: 32px 32px 36px;
    width: 380px;
    max-width: 100%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }

  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    margin-bottom: 20px;
  }

  .logo-text { font-size: 20px; font-weight: 700; color: #5b5fc7; }

  .page-title {
    font-size: 22px; font-weight: 700;
    color: #1a1a2e; text-align: center;
    margin-bottom: 8px;
  }

  .page-sub {
    font-size: 13px; color: #888;
    text-align: center; margin-bottom: 28px;
  }

  .field { margin-bottom: 16px; }

  .field label {
    display: block;
    font-size: 14px; font-weight: 500;
    color: #1a1a2e; margin-bottom: 8px;
  }

  .input-wrap {
    position: relative;
    display: flex; align-items: center;
    border: 1.5px solid #e0e0e8;
    border-radius: 10px;
    background: #fafafa;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within { border-color: #5b5fc7; background: #fff; }
  .input-wrap.error { border-color: #e74c3c; }

  .input-icon {
    position: absolute; left: 14px;
    width: 16px; height: 16px;
    stroke: #aaa; fill: none;
    stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    pointer-events: none;
  }

  .field input {
    width: 100%;
    padding: 12px 40px 12px 40px;
    border: none; border-radius: 10px;
    background: transparent;
    font-size: 14px; font-family: 'Inter', sans-serif;
    color: #1a1a2e; outline: none;
  }

  .eye-btn {
    position: absolute; right: 12px;
    background: none; border: none;
    cursor: pointer; padding: 0;
    display: flex; align-items: center;
  }

  .eye-btn svg {
    width: 16px; height: 16px;
    stroke: #aaa; fill: none;
    stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
  }

  .field-error {
    font-size: 12px; color: #e74c3c;
    margin-top: 5px; min-height: 16px; display: block;
  }

  .api-msg {
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px; font-weight: 500;
    margin-bottom: 16px; text-align: center;
    display: none;
  }
  .api-msg.error   { display: block; background: #fef0f0; color: #c0392b; border: 1px solid #f5c6cb; }
  .api-msg.success { display: block; background: #f0fef4; color: #1a7a3a; border: 1px solid #b7eac7; }

  .btn-primary {
    width: 100%;
    padding: 14px;
    background: #5b5fc7;
    border: none; border-radius: 10px;
    font-size: 15px; font-weight: 600;
    color: #fff; font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: background 0.2s, opacity 0.2s;
    margin-top: 8px;
  }

  .btn-primary:hover:not(:disabled) { background: #4a4eb6; }
  .btn-primary:disabled { opacity: 0.65; cursor: not-allowed; }

  .expired-msg {
    text-align: center;
    color: #c0392b;
    font-size: 14px;
    margin-bottom: 16px;
  }

  .back-link {
    display: block; text-align: center;
    margin-top: 18px;
    font-size: 13px; color: #5b5fc7;
    text-decoration: none; font-weight: 500;
  }

  .back-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="card">

  <div class="logo-wrap">
    <svg width="56" height="56" viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
      <circle cx="28" cy="28" r="28" fill="#eeeeff"/>
      <polyline points="10,18 19,38 28,22" fill="none" stroke="#5b5fc7" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="28,22 37,38 46,18" fill="none" stroke="#5b5fc7" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="14" y1="41" x2="42" y2="41" stroke="#5b5fc7" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <span class="logo-text">VroomNepal</span>
  </div>

  <div class="page-title">Reset Password</div>
  <div class="page-sub">Enter your new password below</div>

  <div class="api-msg" id="apiMsg"></div>

  <div id="formSection">
    <div class="field">
      <label>New Password</label>
      <div class="input-wrap" id="pwd1Wrap">
        <svg class="input-icon" viewBox="0 0 24 24">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input type="password" id="pwd1" placeholder="••••••••" oninput="clearErr('pwd1Wrap','pwd1Err')"/>
        <button class="eye-btn" type="button" onclick="toggle('pwd1','eye1')">
          <svg id="eye1" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <span class="field-error" id="pwd1Err"></span>
    </div>

    <div class="field">
      <label>Confirm New Password</label>
      <div class="input-wrap" id="pwd2Wrap">
        <svg class="input-icon" viewBox="0 0 24 24">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input type="password" id="pwd2" placeholder="••••••••" oninput="clearErr('pwd2Wrap','pwd2Err')"/>
        <button class="eye-btn" type="button" onclick="toggle('pwd2','eye2')">
          <svg id="eye2" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <span class="field-error" id="pwd2Err"></span>
    </div>

    <button class="btn-primary" id="resetBtn" onclick="resetPassword()">Reset Password</button>
  </div>

  <a href="login.html" class="back-link">← Back to Login</a>

</div>

<script>
  const API_BASE = 'http://localhost:5001/api';

  // Get reset token from URL
  const params = new URLSearchParams(window.location.search);
  const resetToken = params.get('token');

  // If no token, show error immediately
  if (!resetToken) {
    document.getElementById('formSection').style.display = 'none';
    const msg = document.getElementById('apiMsg');
    msg.textContent = 'Invalid or missing reset link. Please go through Forgot Password again.';
    msg.className = 'api-msg error';
  }

  function showApiMsg(msg, type) {
    const el = document.getElementById('apiMsg');
    el.textContent = msg;
    el.className = 'api-msg ' + type;
  }

  function clearErr(wrapId, errId) {
    document.getElementById(wrapId).classList.remove('error');
    document.getElementById(errId).textContent = '';
  }

  function showErr(wrapId, errId, msg) {
    document.getElementById(wrapId).classList.add('error');
    document.getElementById(errId).textContent = msg;
  }

  function toggle(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon  = document.getElementById(iconId);
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;
    } else {
      input.type = 'password';
      icon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    }
  }

  async function resetPassword() {
    const pwd1 = document.getElementById('pwd1').value;
    const pwd2 = document.getElementById('pwd2').value;
    let valid  = true;

    if (!pwd1) {
      showErr('pwd1Wrap', 'pwd1Err', 'Please enter a new password.');
      valid = false;
    } else if (pwd1.length < 6) {
      showErr('pwd1Wrap', 'pwd1Err', 'Password must be at least 6 characters.');
      valid = false;
    }

    if (!pwd2) {
      showErr('pwd2Wrap', 'pwd2Err', 'Please confirm your password.');
      valid = false;
    } else if (pwd1 && pwd2 !== pwd1) {
      showErr('pwd2Wrap', 'pwd2Err', 'Passwords do not match.');
      valid = false;
    }

    if (!valid) return;

    const btn = document.getElementById('resetBtn');
    btn.disabled = true;
    btn.textContent = 'Resetting…';

    try {
      const res = await fetch(`${API_BASE}/auth/reset-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ resetToken, newPassword: pwd1 }),
      });

      const data = await res.json();

      if (!res.ok || !data.success) {
        showApiMsg(data.message || 'Failed to reset password.', 'error');
        if (data.message && data.message.includes('expired')) {
          document.getElementById('formSection').style.display = 'none';
        }
        return;
      }

      showApiMsg('Password reset successfully! Redirecting to login…', 'success');
      document.getElementById('formSection').style.display = 'none';

      setTimeout(() => {
        window.location.href = 'login.html';
      }, 1500);

    } catch {
      showApiMsg('Cannot connect to server. Make sure backend is running.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Reset Password';
    }
  }
</script>

</body>
</html>
