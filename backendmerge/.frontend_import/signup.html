<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VroomNepal - Sign Up</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #f0f0f8;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 24px 16px;
  }

  .card {
    background: #ffffff;
    border-radius: 18px;
    padding: 28px 28px 24px;
    width: 340px;
    max-width: 100%;
    box-shadow: 0 8px 32px rgba(80,80,180,0.10), 0 1.5px 6px rgba(0,0,0,0.07);
  }

  /* Logo */
  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    margin-bottom: 22px;
  }

  .logo-text {
    font-size: 17px;
    font-weight: 700;
    color: #5b5fc7;
  }

  /* Field */
  .field {
    margin-bottom: 11px;
  }

  .field label {
    display: block;
    font-size: 11.5px;
    font-weight: 600;
    color: #222238;
    margin-bottom: 5px;
  }

  /* Shadow border input container */
  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
    border-radius: 9px;
    background: #fafafa;
    box-shadow: 0 0 0 1.5px #e2e2f0, 0 2px 8px rgba(91,95,199,0.10);
    transition: box-shadow 0.2s, background 0.2s;
  }

  .input-wrap:focus-within {
    box-shadow: 0 0 0 2px #5b5fc7, 0 2px 12px rgba(91,95,199,0.18);
    background: #fff;
  }

  .input-icon {
    position: absolute;
    left: 11px;
    width: 14px;
    height: 14px;
    stroke: #b0b0c8;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    pointer-events: none;
  }

  .field input {
    width: 100%;
    padding: 10px 34px 10px 32px;
    border: none;
    border-radius: 9px;
    background: transparent;
    font-size: 12.5px;
    font-family: 'Inter', sans-serif;
    color: #1a1a2e;
    outline: none;
  }

  .field input::placeholder { color: #c0c0d4; }

  .eye-btn {
    position: absolute;
    right: 10px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    display: flex;
    align-items: center;
  }

  .eye-btn svg {
    width: 14px;
    height: 14px;
    stroke: #b0b0c8;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* Sign Up button */
  .signup-btn {
    width: 100%;
    padding: 11px;
    background: linear-gradient(to right, #7b61ff, #5a42e0);
    color: #fff;
    border: none;
    border-radius: 9px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    margin-top: 14px;
    margin-bottom: 13px;
    box-shadow: 0 4px 14px rgba(91,95,199,0.30);
    transition: opacity 0.2s;
  }

  .signup-btn:hover { opacity: 0.92; }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: #ebebf4;
  }

  .divider-text {
    font-size: 10px;
    color: #aaaabc;
    letter-spacing: 1px;
    font-weight: 500;
    white-space: nowrap;
  }

  /* Google button */
  .btn-google {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 9px;
    background: #fafafa;
    color: #333348;
    font-size: 12.5px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 0 0 1.5px #e2e2f0, 0 2px 8px rgba(0,0,0,0.05);
    transition: background 0.2s;
    margin-bottom: 14px;
  }

  .btn-google:hover { background: #ededf8; }

  .btn-google svg { width: 16px; height: 16px; flex-shrink: 0; }

  /* Footer */
  .footer {
    font-size: 11.5px;
    color: #999aaa;
    text-align: center;
  }

  .footer a {
    color: #5b5fc7;
    font-weight: 600;
    text-decoration: none;
    margin-left: 3px;
  }

  .footer a:hover { text-decoration: underline; }

  .input-wrap.error {
    box-shadow: 0 0 0 2px #e74c3c, 0 2px 8px rgba(231,76,60,0.12);
  }

  .field-error {
    font-size: 11px;
    color: #e74c3c;
    margin-top: 4px;
    min-height: 15px;
    display: block;
  }
</style>
</head>
<body>

<div class="card">

  <!-- Logo -->
  <div class="logo-wrap">
    <svg width="50" height="50" viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
      <circle cx="28" cy="28" r="28" fill="#eeeeff"/>
      <polyline points="10,18 19,38 28,22" fill="none" stroke="#5b5fc7" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="28,22 37,38 46,18" fill="none" stroke="#5b5fc7" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="14" y1="41" x2="42" y2="41" stroke="#5b5fc7" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <span class="logo-text">VroomNepal</span>
  </div>

  <!-- Full Name -->
  <div class="field">
    <label>Full Name</label>
    <div class="input-wrap" id="nameWrap">
      <svg class="input-icon" viewBox="0 0 24 24">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <input id="fullname" type="text" placeholder="John Doe" oninput="clearErr('nameWrap','nameErr')"/>
    </div>
    <span class="field-error" id="nameErr"></span>
  </div>

  <!-- Phone Number -->
  <div class="field">
    <label>Phone Number</label>
    <div class="input-wrap" id="phoneWrap">
      <svg class="input-icon" viewBox="0 0 24 24">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 9a16 16 0 0 0 6.06 6.06l1.14-1.14a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
      </svg>
      <input id="phone" type="text" placeholder="+977 9812345678" oninput="clearErr('phoneWrap','phoneErr')"/>
    </div>
    <span class="field-error" id="phoneErr"></span>
  </div>

  <!-- Email -->
  <div class="field">
    <label>Email</label>
    <div class="input-wrap" id="emailWrap">
      <svg class="input-icon" viewBox="0 0 24 24">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <polyline points="2,4 12,13 22,4"/>
      </svg>
      <input id="email" type="email" placeholder="example@email.com" oninput="clearErr('emailWrap','emailErr')"/>
    </div>
    <span class="field-error" id="emailErr"></span>
  </div>

  <!-- Password -->
  <div class="field">
    <label>Password</label>
    <div class="input-wrap" id="pwd1Wrap">
      <svg class="input-icon" viewBox="0 0 24 24">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <input type="password" placeholder="••••••••" id="pwd1" oninput="clearErr('pwd1Wrap','pwd1Err')"/>
      <button class="eye-btn" type="button" onclick="toggle('pwd1','eye1')">
        <svg id="eye1" viewBox="0 0 24 24">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
    <span class="field-error" id="pwd1Err"></span>
  </div>

  <!-- Confirm Password -->
  <div class="field">
    <label>Confirm Password</label>
    <div class="input-wrap" id="pwd2Wrap">
      <svg class="input-icon" viewBox="0 0 24 24">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <input type="password" placeholder="••••••••" id="pwd2" oninput="clearErr('pwd2Wrap','pwd2Err')"/>
      <button class="eye-btn" type="button" onclick="toggle('pwd2','eye2')">
        <svg id="eye2" viewBox="0 0 24 24">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
    <span class="field-error" id="pwd2Err"></span>
  </div>

  <!-- Sign Up button -->
  <button class="signup-btn" onclick="handleSignup()">Sign Up</button>

  <!-- Divider -->
  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-text">OR CONNECT WITH</span>
    <div class="divider-line"></div>
  </div>

  <!-- Google -->
  <button class="btn-google">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.5 0 6.7 1.2 9.2 3.6l6.8-6.8C35.9 2.4 30.5 0 24 0 14.6 0 6.5 5.4 2.6 13.2l8 6.2C12.4 13.7 17.7 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M47 24.6c0-1.6-.2-3.1-.4-4.6H24v9h12.9c-.6 3-2.3 5.5-4.8 7.2l7.7 6c4.5-4.2 7.2-10.4 7.2-17.6z"/>
      <path fill="#FBBC05" d="M10.5 28.6c-.5-1.5-.8-3-.8-4.6s.3-3.1.8-4.6l-8-6.2C.9 16.5 0 20.1 0 24c0 3.9.9 7.5 2.6 10.8l8-6.2z"/>
      <path fill="#34A853" d="M24 48c6.5 0 11.9-2.1 15.9-5.8l-7.7-6c-2.2 1.5-5 2.4-8.2 2.4-6.3 0-11.6-4.2-13.5-9.9l-8 6.2C6.5 42.6 14.6 48 24 48z"/>
    </svg>
    Continue with Google
  </button>

  <!-- Footer -->
  <div class="footer">
    Already have an account?<a href="login.html">Login</a>
  </div>

</div>

<script>
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  const phoneRegex = /^\+?[0-9\s\-]{7,15}$/;

  function showErr(wrapId, errId, msg) {
    document.getElementById(wrapId).classList.add('error');
    document.getElementById(errId).textContent = msg;
  }

  function clearErr(wrapId, errId) {
    document.getElementById(wrapId).classList.remove('error');
    document.getElementById(errId).textContent = '';
  }

  function handleSignup() {
    const name     = document.getElementById('fullname').value.trim();
    const phone    = document.getElementById('phone').value.trim();
    const email    = document.getElementById('email').value.trim();
    const pwd1     = document.getElementById('pwd1').value;
    const pwd2     = document.getElementById('pwd2').value;
    let valid = true;

    // Full name
    if (!name) {
      showErr('nameWrap', 'nameErr', 'Please enter your full name.');
      valid = false;
    } else if (name.length < 2) {
      showErr('nameWrap', 'nameErr', 'Name must be at least 2 characters.');
      valid = false;
    }

    // Phone
    if (!phone) {
      showErr('phoneWrap', 'phoneErr', 'Please enter your phone number.');
      valid = false;
    } else if (!phoneRegex.test(phone)) {
      showErr('phoneWrap', 'phoneErr', 'Please enter a valid phone number.');
      valid = false;
    }

    // Email
    if (!email) {
      showErr('emailWrap', 'emailErr', 'Please enter your email address.');
      valid = false;
    } else if (!emailRegex.test(email)) {
      showErr('emailWrap', 'emailErr', 'Please enter a valid email address.');
      valid = false;
    }

    // Password
    if (!pwd1) {
      showErr('pwd1Wrap', 'pwd1Err', 'Please enter a password.');
      valid = false;
    } else if (pwd1.length < 6) {
      showErr('pwd1Wrap', 'pwd1Err', 'Password must be at least 6 characters.');
      valid = false;
    }

    // Confirm password
    if (!pwd2) {
      showErr('pwd2Wrap', 'pwd2Err', 'Please confirm your password.');
      valid = false;
    } else if (pwd1 && pwd2 !== pwd1) {
      showErr('pwd2Wrap', 'pwd2Err', 'Passwords do not match.');
      valid = false;
    }

    if (valid) {
      alert('Account created successfully!');
    }
  }

  function toggle(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon  = document.getElementById(iconId);
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;
    } else {
      input.type = 'password';
      icon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    }
  }
</script>

</body>
</html>
