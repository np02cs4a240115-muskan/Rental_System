<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VroomNepal - Forgot Password</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background-color: #e8e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .card {
    background: #ffffff;
    border-radius: 20px;
    padding: 32px 32px 36px;
    width: 380px;
    max-width: 100%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    position: relative;
  }

  /* Back to Login */
  .back-link {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: #5b5fc7;
    text-decoration: none;
    font-weight: 500;
    margin-bottom: 24px;
  }

  .back-link svg {
    width: 16px;
    height: 16px;
    stroke: #5b5fc7;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* Logo */
  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    margin-bottom: 20px;
  }

  .logo-icon {
    width: 56px;
    height: 56px;
  }

  .logo-text {
    font-size: 20px;
    font-weight: 700;
    color: #5b5fc7;
    letter-spacing: 0.2px;
  }

  /* Title */
  .page-title {
    font-size: 22px;
    font-weight: 700;
    color: #1a1a2e;
    text-align: center;
    margin-bottom: 24px;
  }

  /* Email field */
  .field-label {
    font-size: 14px;
    font-weight: 500;
    color: #1a1a2e;
    margin-bottom: 8px;
    display: block;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 16px;
  }

  .input-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    stroke: #aaa;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .text-input {
    width: 100%;
    padding: 12px 14px 12px 40px;
    border: 1.5px solid #e0e0e8;
    border-radius: 10px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    color: #1a1a2e;
    background: #fafafa;
    outline: none;
    transition: border-color 0.2s;
  }

  .text-input::placeholder {
    color: #c0c0cc;
  }

  .text-input:focus {
    border-color: #5b5fc7;
    background: #fff;
  }

  /* Send OTP button */
  .btn-primary {
    width: 100%;
    padding: 14px;
    background: #5b5fc7;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 400;
    color: #ffffff;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.2s;
    margin-bottom: 28px;
  }

  .btn-primary:hover {
    background: #4a4eb6;
  }

  .btn-primary svg {
    width: 16px;
    height: 16px;
    stroke: #fff;
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: #e8e8ee;
  }

  .divider-text {
    font-size: 11px;
    color: #aaaabc;
    letter-spacing: 1px;
    font-weight: 500;
    white-space: nowrap;
  }

  /* OTP section */
  .otp-instruction {
    font-size: 14px;
    font-weight: 600;
    color: #1a1a2e;
    text-align: center;
    margin-bottom: 20px;
  }

  .otp-boxes {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 24px;
  }

  .otp-input {
    width: 46px;
    height: 46px;
    border-radius: 10px;
    border: 1.5px solid #e0e0e8;
    background: #f0f0f8;
    font-size: 20px;
    font-weight: 600;
    text-align: center;
    color: #1a1a2e;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    caret-color: #5b5fc7;
  }

  .otp-input:focus {
    border-color: #5b5fc7;
    background: #fff;
  }

  /* Verify OTP button */
  .btn-verify {
    width: 100%;
    padding: 14px;
    background: #5b5fc7;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 400;
    color: #ffffff;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: background 0.2s;
    margin-bottom: 16px;
  }

  .btn-verify:hover {
    background: #4a4eb6;
  }

  /* Resend */
  .resend-wrap {
    text-align: center;
  }

  .resend-timer {
    font-size: 13px;
    font-weight: 600;
    color: #1a1a2e;
    margin-bottom: 4px;
  }

  .resend-link {
    font-size: 13px;
    color: #5b5fc7;
    font-weight: 500;
    text-decoration: none;
    cursor: pointer;
  }

  .resend-link:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>

<div class="card">

  <!-- Back to Login -->
  <a href="login.html" class="back-link">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Login
  </a>

  <!-- Logo -->
  <div class="logo-wrap">
    <svg class="logo-icon" viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
      <!-- Outer circle background -->
      <circle cx="28" cy="28" r="28" fill="#eeeeff"/>
      <!-- VN logo mark: two V shapes forming a mountain/road -->
      <!-- Left V -->
      <polyline points="10,18 19,38 28,22" fill="none" stroke="#5b5fc7" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Right V -->
      <polyline points="28,22 37,38 46,18" fill="none" stroke="#5b5fc7" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Road line at bottom -->
      <line x1="14" y1="41" x2="42" y2="41" stroke="#5b5fc7" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <span class="logo-text">VroomNepal</span>
  </div>

  <!-- Title -->
  <div class="page-title">Forgot Password?</div>

  <!-- Email -->
  <label class="field-label">Email</label>
  <div class="input-wrap">
    <svg class="input-icon" viewBox="0 0 24 24">
      <rect x="2" y="4" width="20" height="16" rx="2"/>
      <polyline points="2,4 12,13 22,4"/>
    </svg>
    <input class="text-input" type="email" placeholder="john@example.com"/>
  </div>

  <!-- Send OTP button -->
  <button class="btn-primary">
    Send OTP
    <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
  </button>

  <!-- Divider -->
  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-text">Verification</span>
    <div class="divider-line"></div>
  </div>

  <!-- OTP instruction -->
  <div class="otp-instruction">Enter the 6-digit code sent to your email</div>

  <!-- OTP boxes -->
  <div class="otp-boxes">
    <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
    <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
    <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
    <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
    <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
    <input class="otp-input" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
  </div>

  <!-- Verify OTP button -->
  <button class="btn-verify">Verify OTP</button>

  <!-- Resend -->
  <div class="resend-wrap">
    <div class="resend-timer">Resend OTP in 60s</div>
    <a href="#" class="resend-link">Resend OTP &gt;</a>
  </div>

</div>

<script>
  // OTP auto-advance
  const otpInputs = document.querySelectorAll('.otp-input');
  otpInputs.forEach((input, i) => {
    input.addEventListener('input', () => {
      input.value = input.value.replace(/[^0-9]/g, '');
      if (input.value && i < otpInputs.length - 1) {
        otpInputs[i + 1].focus();
      }
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !input.value && i > 0) {
        otpInputs[i - 1].focus();
      }
    });
  });

  // Resend countdown
  let seconds = 60;
  const timerEl = document.querySelector('.resend-timer');
  const interval = setInterval(() => {
    seconds--;
    if (seconds <= 0) {
      clearInterval(interval);
      timerEl.textContent = 'OTP expired';
    } else {
      timerEl.textContent = `Resend OTP in ${seconds}s`;
    }
  }, 1000);
</script>

</body>
</html>
